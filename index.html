<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SPACE GAME</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>
body { margin:0; overflow:hidden; background:black; }
#ui {
    position:absolute;
    top:20px;
    left:20px;
    color:white;
    z-index:10;
}
.panel {
    background:rgba(0,0,0,0.6);
    padding:15px;
    border:1px solid rgba(0,150,255,0.3);
}
</style>
</head>

<body>

<div id="ui">
    <div class="panel">
        🚀 WASD = fliegen<br>
        SHIFT = Boost<br>
        E = Landen<br>
        Q = zurück ins All<br>
    </div>
    <div id="info" class="panel mt-2">Space ready...</div>
</div>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 10000);
camera.position.z = 100;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

/* =====================
   LIGHT (SUN)
===================== */
const sunLight = new THREE.PointLight(0xffffff, 3, 0);
scene.add(sunLight);

/* =====================
   STARFIELD
===================== */
const starGeo = new THREE.BufferGeometry();
let starVertices = [];

for(let i=0;i<20000;i++){
    starVertices.push(
        Math.random()*8000-4000,
        Math.random()*8000-4000,
        Math.random()*8000-4000
    );
}

starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVertices,3));
scene.add(new THREE.Points(starGeo,new THREE.PointsMaterial({color:0xffffff})));

/* =====================
   PLANETS (ALLE)
===================== */
const planets = [];

function planet(name,size,dist,color){
    const mesh = new THREE.Mesh(
        new THREE.SphereGeometry(size,64,64),
        new THREE.MeshStandardMaterial({color:color})
    );
    mesh.position.x = dist;
    mesh.userData = {name:name,size:size};
    scene.add(mesh);
    planets.push(mesh);
}

// Sonne
planet("Sonne",10,0,0xffcc00);

// Planeten
planet("Merkur",1,20,0xaaaaaa);
planet("Venus",2,30,0xffcc66);
planet("Erde",2.2,40,0x3399ff);
planet("Mars",1.5,50,0xff3300);
planet("Jupiter",5,70,0xff9966);
planet("Saturn",4,90,0xffcc99);
planet("Uranus",3,110,0x66ffff);
planet("Neptun",3,130,0x3366ff);

/* =====================
   ISS
===================== */
const iss = new THREE.Mesh(
    new THREE.BoxGeometry(1,0.3,0.3),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(iss);

let issAngle = 0;

/* =====================
   ROCKET (PLAYER)
===================== */
const rocket = new THREE.Mesh(
    new THREE.ConeGeometry(1,3,16),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(rocket);

/* =====================
   CONTROLS
===================== */
let keys = {};
window.addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
window.addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

let speed = 0.5;
let landed = false;
let currentPlanet = null;

/* =====================
   MOVE
===================== */
function move(){

    if(landed) return;

    let boost = keys["shift"] ? 3 : 1;

    if(keys["w"]) camera.position.z -= speed*boost;
    if(keys["s"]) camera.position.z += speed*boost;
    if(keys["a"]) camera.position.x -= speed*boost;
    if(keys["d"]) camera.position.x += speed*boost;

    rocket.position.copy(camera.position);
}

/* =====================
   LAND SYSTEM
===================== */
function checkLanding(){
    planets.forEach(p=>{
        const dist = camera.position.distanceTo(p.position);

        if(dist < p.userData.size + 5){
            if(keys["e"]){
                landed = true;
                currentPlanet = p;

                camera.position.set(
                    p.position.x,
                    p.position.y + p.userData.size + 2,
                    p.position.z
                );

                document.getElementById("info").innerText =
                    "Gelandet auf " + p.userData.name;
            }
        }
    });
}

/* =====================
   SURFACE MODE
===================== */
function surfaceMove(){
    let moveSpeed = 0.2;

    if(keys["w"]) camera.position.z -= moveSpeed;
    if(keys["s"]) camera.position.z += moveSpeed;
    if(keys["a"]) camera.position.x -= moveSpeed;
    if(keys["d"]) camera.position.x += moveSpeed;

    if(keys["q"]){
        landed = false;
        camera.position.z += 20;
        document.getElementById("info").innerText = "Zurück im All";
    }
}

/* =====================
   LOOP
===================== */
function animate(){
    requestAnimationFrame(animate);

    if(!landed){
        move();
        checkLanding();
    } else {
        surfaceMove();
    }

    planets.forEach(p=>p.rotation.y+=0.003);

    issAngle += 0.01;
    iss.position.x = Math.cos(issAngle)*45;
    iss.position.z = Math.sin(issAngle)*45;

    renderer.render(scene,camera);
}
animate();

/* =====================
   RESIZE
===================== */
window.addEventListener("resize", ()=>{
    camera.aspect = innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>




<script>

/* =====================
   ULTRA REAL TEXTURES
===================== */
const texLoader = new THREE.TextureLoader();

const textures = {
    sun: texLoader.load("https://threejs.org/examples/textures/planets/sun.jpg"),
    earth: texLoader.load("https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg"),
    earthNight: texLoader.load("https://threejs.org/examples/textures/planets/earth_lights_2048.png"),
    mars: texLoader.load("https://threejs.org/examples/textures/planets/mars_1024.jpg"),
    jupiter: texLoader.load("https://threejs.org/examples/textures/planets/jupiter.jpg"),
    saturn: texLoader.load("https://threejs.org/examples/textures/planets/saturn.jpg")
};

/* =====================
   APPLY TEXTURES
===================== */
planets.forEach(p=>{
    if(p.userData.name === "Erde"){
        p.material.map = textures.earth;

        // City Lights Layer
        const night = new THREE.Mesh(
            new THREE.SphereGeometry(p.userData.size+0.01,64,64),
            new THREE.MeshBasicMaterial({
                map: textures.earthNight,
                transparent:true,
                opacity:0.6
            })
        );
        night.position.copy(p.position);
        scene.add(night);
    }

    if(p.userData.name === "Mars"){
        p.material.map = textures.mars;
    }

    if(p.userData.name === "Jupiter"){
        p.material.map = textures.jupiter;
    }

    if(p.userData.name === "Saturn"){
        p.material.map = textures.saturn;
    }

    if(p.userData.name === "Sonne"){
        p.material.map = textures.sun;
    }

    p.material.needsUpdate = true;
});

/* =====================
   MISSION SYSTEM
===================== */
let mission = {
    target: "Mars",
    completed:false
};

function checkMission(){
    if(currentPlanet && currentPlanet.userData.name === mission.target && !mission.completed){
        mission.completed = true;
        document.getElementById("info").innerText = "MISSION ERFOLGREICH: Mars erreicht 🚀";
    }
}

/* =====================
   ASTRONAUT (ON LAND)
===================== */
const astronaut = new THREE.Mesh(
    new THREE.BoxGeometry(0.5,1,0.5),
    new THREE.MeshBasicMaterial({color:0xffffff})
);
scene.add(astronaut);
astronaut.visible = false;

/* =====================
   LASER / MINING
===================== */
const laserMat = new THREE.LineBasicMaterial({color:0x00ffff});

function shootLaser(){
    const points = [];
    points.push(camera.position.clone());
    points.push(new THREE.Vector3(
        camera.position.x,
        camera.position.y,
        camera.position.z - 10
    ));

    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const laser = new THREE.Line(geo, laserMat);

    scene.add(laser);

    setTimeout(()=>scene.remove(laser), 100);
}

window.addEventListener("click", ()=>{
    if(landed){
        shootLaser();
    }
});

/* =====================
   VIEW MODES (COCKPIT)
===================== */
let cockpit = false;

window.addEventListener("keydown", e=>{
    if(e.key.toLowerCase() === "c"){
        cockpit = !cockpit;

        if(cockpit){
            camera.position.set(rocket.position.x, rocket.position.y+1, rocket.position.z);
            document.getElementById("info").innerText = "Cockpit Ansicht aktiviert";
        } else {
            camera.position.z += 10;
            document.getElementById("info").innerText = "Außenansicht";
        }
    }
});

/* =====================
   UPDATE LOOP ADDONS
===================== */
const oldAnimate = animate;

animate = function(){
    requestAnimationFrame(animate);

    if(!landed){
        move();
        checkLanding();
    } else {
        surfaceMove();

        astronaut.visible = true;
        astronaut.position.copy(camera.position);
    }

    checkMission();

    planets.forEach(p=>p.rotation.y+=0.003);

    issAngle += 0.01;
    iss.position.x = Math.cos(issAngle)*45;
    iss.position.z = Math.sin(issAngle)*45;

    renderer.render(scene,camera);
};

</script>
