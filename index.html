<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MILCHSTRASSE // DATEN-TERMINAL</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@100;400&display=swap');

body {
    margin: 0;
    background: black;
    color: #e2e8f0;
    font-family: 'Space Grotesk', sans-serif;
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

.mono { font-family: 'JetBrains Mono', monospace; }

.glass-panel {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(0,191,255,0.1);
}

.fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: all 1s ease;
}
.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Boot Screen */
#boot {
    position: fixed;
    inset: 0;
    background: black;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
}
</style>
</head>

<body>

<!-- Boot Screen -->
<div id="boot">
    <div id="bootText"></div>
</div>

<canvas id="stars"></canvas>

<nav class="relative z-10 p-6 flex justify-between border-b border-white/10">
    <div class="flex items-center gap-4">
        <i data-lucide="orbit" class="text-blue-400"></i>
        <span class="font-bold tracking-widest">Milky Way // Atlas</span>
    </div>

    <div class="flex gap-4">
        <button onclick="toggleSound()" class="mono text-xs">🔊 SOUND</button>
        <button onclick="fakeScan()" class="mono text-xs">SCAN</button>
    </div>
</nav>

<main class="relative z-10 max-w-6xl mx-auto p-6">

<div class="glass-panel p-10 rounded-2xl mb-10 fade-in">
    <h1 id="title" class="text-5xl font-bold mb-4"></h1>
    <p id="desc" class="text-blue-300"></p>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mt-10">
        <div>
            <div class="mono text-xs">ALTER</div>
            <div id="age" class="text-xl font-bold"></div>
        </div>
        <div>
            <div class="mono text-xs">STERNE</div>
            <div id="starsCount" class="text-xl font-bold"></div>
        </div>
        <div>
            <div class="mono text-xs">MASSE</div>
            <div id="mass" class="text-xl font-bold"></div>
        </div>
        <div>
            <div class="mono text-xs">STATUS</div>
            <div id="status" class="text-green-400 font-bold"></div>
        </div>
    </div>
</div>

</main>

<audio id="bgSound" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7c3d.mp3">
</audio>

<script>
lucide.createIcons();

/* =======================
   STARFIELD
======================= */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 300; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        z: Math.random() * canvas.width
    });
}

function drawStars() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    stars.forEach(s => {
        s.z -= 1;
        if (s.z <= 0) s.z = canvas.width;

        let x = (s.x - canvas.width/2) * (canvas.width/s.z) + canvas.width/2;
        let y = (s.y - canvas.height/2) * (canvas.height/s.z) + canvas.height/2;

        ctx.fillRect(x, y, 1.5, 1.5);
    });

    requestAnimationFrame(drawStars);
}
drawStars();

/* =======================
   TYPING EFFECT
======================= */
function typeText(el, text, speed=30) {
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, speed);
        }
    }
    typing();
}

typeText(document.getElementById("title"), "UNSERE GALAXIE");
typeText(document.getElementById("desc"),
"Ein gigantisches System aus Milliarden Sternen im Universum...", 20);

/* =======================
   LIVE DATA
======================= */
let starsVal = 200;

setInterval(() => {
    starsVal += Math.random();
    document.getElementById("starsCount").innerText =
        starsVal.toFixed(2) + " Mrd.";

    document.getElementById("age").innerText =
        (13.6 + Math.random()*0.01).toFixed(2) + " Mrd. J";

    document.getElementById("mass").innerText =
        (1.5 + Math.random()*0.01).toFixed(2) + " T";

}, 2000);

document.getElementById("status").innerText = "STABIL";

/* =======================
   SOUND
======================= */
let soundOn = false;
function toggleSound() {
    const audio = document.getElementById("bgSound");
    soundOn = !soundOn;
    soundOn ? audio.play() : audio.pause();
}

/* =======================
   FAKE SCAN
======================= */
function fakeScan() {
    document.getElementById("status").innerText = "SCANNING...";
    setTimeout(()=>{
        document.getElementById("status").innerText = "STABIL";
    },2000);
}

/* =======================
   BOOT SCREEN
======================= */
const bootText = document.getElementById("bootText");
const bootLines = [
"INITIALIZING SYSTEM...",
"LOADING GALAXY DATA...",
"CONNECTING TO NASA CORE...",
"ACCESS GRANTED"
];

let i = 0;

function boot() {
    if (i < bootLines.length) {
        bootText.innerHTML += bootLines[i] + "<br>";
        i++;
        setTimeout(boot, 600);
    } else {
        setTimeout(()=>{
            document.getElementById("boot").style.display = "none";
        },1000);
    }
}
boot();

/* =======================
   SCROLL ANIMATION
======================= */
const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add("visible");
        }
    });
});
document.querySelectorAll(".fade-in").forEach(el=>{
    observer.observe(el);
});

/* =======================
   EASTER EGG 😏
======================= */
let keys = [];
window.addEventListener("keydown", e=>{
    keys.push(e.key);
    if(keys.join("").includes("space")){
        alert("🚀 SECRET UNLOCKED");
        keys = [];
    }
});
</script>

</body>
</html>
